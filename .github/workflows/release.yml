name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties', 'android/settings.gradle.kts', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/release.keystore

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android Release APK
        run: |
          flutter build apk --release \
            --android-keyalias=${{ secrets.KEY_ALIAS }} \
            --android-keystore=android/app/release.keystore \
            --android-keystore-password=${{ secrets.KEYSTORE_PASSWORD }} \
            --android-key-password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: radio-sathi-release-apk-${{ inputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload Source Maps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radio-sathi-sourcemaps-${{ inputs.version }}
          path: build/app/outputs/flutter-apk/*.map
          if-no-files-found: ignore